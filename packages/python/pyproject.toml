[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nzr-autofix"
version = "0.1.0"
description = "NZR Autofix SDK — capture errors and send to NZR Manager for AI-powered diagnosis and auto-fix"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "NZR", email = "dev@nzr.com"}]
dependencies = [
    "urllib3>=1.26",
]

[project.optional-dependencies]
django = ["django>=3.2"]
flask = ["flask>=2.0"]

[tool.setuptools.packages.find]
include = ["nzr_autofix*"]
